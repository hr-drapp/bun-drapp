<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mongo Schema Visualizer</title>
  <style>
    :root {
      --bg: #f5f3ef;
      --panel: #fffdf8;
      --ink: #1d1a16;
      --muted: #6f675d;
      --line: #d8d1c8;
      --accent: #9d3a0f;
      --accent-soft: #f5d8c8;
      --ok: #2f6f43;
      --warn: #a23f26;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fef8f1 0%, #f5f3ef 40%, #ece8e0 100%);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #fff7ef 0%, #fffefb 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .title h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.3px;
    }
    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }
    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 6px 10px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    main {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr 390px;
      gap: 0;
    }
    aside,
    section,
    .detail {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    aside {
      padding: 12px;
    }
    section {
      position: relative;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.78), rgba(255,255,255,0.78)),
        linear-gradient(45deg, rgba(157,58,15,0.04) 25%, transparent 25%, transparent 75%, rgba(157,58,15,0.04) 75%, rgba(157,58,15,0.04) 100%);
      background-size: 100% 100%, 20px 20px;
    }
    .detail {
      border-right: none;
      padding: 12px;
    }
    .search {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .models {
      display: grid;
      gap: 6px;
    }
    .model-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: #fff;
      transition: all 120ms ease;
    }
    .model-item:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }
    .model-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .model-item .name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .model-item .meta {
      font-size: 11px;
      color: var(--muted);
    }
    .canvas-wrap {
      position: absolute;
      inset: 0;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    .legend {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 11px;
      color: var(--muted);
      display: grid;
      gap: 5px;
      pointer-events: none;
    }
    .legend .line {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .swatch {
      width: 14px;
      height: 2px;
      background: var(--accent);
    }
    .swatch.dashed {
      background: linear-gradient(90deg, var(--warn) 50%, transparent 50%);
      background-size: 6px 2px;
    }
    .detail h2 {
      margin: 2px 0 2px;
      font-size: 18px;
      letter-spacing: 0.3px;
    }
    .detail p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #eee7dd;
      vertical-align: top;
    }
    th {
      background: #f8f4ee;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6d5f51;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .pill {
      display: inline-block;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 999px;
      border: 1px solid var(--line);
      margin-right: 3px;
      margin-bottom: 2px;
      background: #fff;
      color: #5a4e42;
      white-space: nowrap;
    }
    .pill.ok {
      border-color: #b6d2c0;
      background: #eef8f1;
      color: var(--ok);
    }
    .pill.bad {
      border-color: #e0b4aa;
      background: #fff0ec;
      color: var(--warn);
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      background: #fff;
    }
    code {
      word-break: break-word;
      white-space: pre-wrap;
      display: inline-block;
      max-width: 100%;
    }
    @media (max-width: 1200px) {
      main {
        grid-template-columns: 260px 1fr;
        grid-template-rows: 55vh 45vh;
      }
      .detail {
        grid-column: 1 / span 2;
        border-top: 1px solid var(--line);
      }
    }
    @media (max-width: 820px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      main {
        display: block;
      }
      aside, section, .detail {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      section {
        height: 55vh;
      }
    }
  </style>
</head>

"source":"NumberEntryClass","target":"GameClass","field":"game","present":true},{"source":"NumberEntryClass","target":"GameTimeClass","field":"game_time","present":true},{"source":"NumberEntryShareClass","target":"AdminClass","field":"admin","present":true},{"source":"NumberEntryShareClass","target":"GameClass","field":"game","present":true},{"source":"NumberEntryShareClass","target":"GameTimeClass","field":"game_time","present":true},{"source":"NumberEntryTransectionClass","target":"NumbersClass","field":"numbers","present":true},{"source":"NumberEntryTransectionClass","target":"AdminClass","field":"admin","present":true},{"source":"NumberEntryTransectionClass","target":"GameClass","field":"game","present":true},{"source":"NumberEntryTransectionClass","target":"GameTimeClass","field":"game_time","present":true},{"source":"OrderClass","target":"UserClass","field":"user","present":true},{"source":"OrderClass","target":"PaymentClass","field":"payment","present":true},{"source":"OrderClass","target":"AddressClass","field":"address","present":true},{"source":"PatientClass","target":"ClinicClass","field":"clinic","present":true},{"source":"PatientClass","target":"TenantClass","field":"tenant","present":true},{"source":"PatientClass","target":"AdminClass","field":"createdBy","present":true},{"source":"PaymentClass","target":"UserClass","field":"user","present":true},{"source":"ProductCategoryClass","target":"ProductCategoryClass","field":"parent","present":true},{"source":"ProductClass","target":"ProductCategoryClass","field":"category","present":true},{"source":"RecordClass","target":"ClinicClass","field":"clinic","present":true},{"source":"RecordClass","target":"TenantClass","field":"tenant","present":true},{"source":"RecordClass","target":"PatientClass","field":"patient","present":true},{"source":"RecordClass","target":"DoctorClass","field":"doctor","present":true},{"source":"RecordClass","target":"AppointmentClass","field":"appointment","present":true},{"source":"ResultClass","target":"GameTimeClass","field":"game_time","present":true},{"source":"ResultClass","target":"NumbersClass","field":"number","present":true},{"source":"SattaEntryClass","target":"AdminClass","field":"admin","present":true},{"source":"SattaEntryClass","target":"GameClass","field":"game","present":true},{"source":"SattaNumberEntryClass","target":"AdminClass","field":"admin","present":true},{"source":"SattaNumberEntryClass","target":"SattaEntryClass","field":"satta_entry","present":true},{"source":"SattaNumberEntryClass","target":"GameClass","field":"game","present":true},{"source":"SattaNumberEntryShareClass","target":"AdminClass","field":"admin","present":true},{"source":"SattaNumberEntryShareClass","target":"GameClass","field":"game","present":true},{"source":"SattaResult","target":"GameClass","field":"game","present":true},{"source":"SpinnerMarketClass","target":"NumberEntryTransectionClass","field":"transection","present":true},{"source":"SpinnerMarketClass","target":"AdminClass","field":"admin","present":true},{"source":"SpinnerMarketClass","target":"GameTimeClass","field":"game_time","present":true},{"source":"WalletAllocationClass","target":"WalletClass","field":"parentWallet","present":true},{"source":"WalletAllocationClass","target":"WalletClass","field":"childWallet","present":true},{"source":"WalletClass","target":"AdminClass","field":"admin","present":true},{"source":"WalletTransactionClass","target":"WalletClass","field":"wallet","present":true},{"source":"WalletTransactionClass","target":"AdminClass","field":"admin","present":true},{"source":"WalletTransactionClass","target":"AdminClass","field":"createdBy","present":true}]};

    const subtitle = document.getElementById("subtitle");
    const stats = document.getElementById("stats");
    const searchInput = document.getElementById("search");
    const modelList = document.getElementById("modelList");
    const detail = document.getElementById("detail");

    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");

    const escapeHtml = (input) => String(input)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

    const nameToModel = new Map(schemaData.models.map((m) => [m.model, m]));

    const nodes = schemaData.models.map((m, i) => ({
      id: m.model,
      label: m.model,
      x: 200 + (i % 8) * 180,
      y: 150 + Math.floor(i / 8) * 140,
      vx: 0,
      vy: 0,
      radius: 30,
    }));

    const nodeById = new Map(nodes.map((n) => [n.id, n]));

    const edges = schemaData.edges.map((e) => ({
      source: e.source,
      target: e.target,
      field: e.field,
      present: e.present,
      sourceNode: nodeById.get(e.source),
      targetNode: nodeById.get(e.target),
    }));

    const view = {
      zoom: 0.7,
      panX: 0,
      panY: 0,
      selected: nodes[0] ? nodes[0].id : null,
      dragNodeId: null,
      draggingCanvas: false,
      dragOffsetX: 0,
      dragOffsetY: 0,
      lastPointerX: 0,
      lastPointerY: 0,
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    const screenToWorld = (x, y) => ({
      x: (x - view.panX) / view.zoom,
      y: (y - view.panY) / view.zoom,
    });

    const resizeCanvas = () => {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * window.devicePixelRatio));
      canvas.height = Math.max(1, Math.floor(rect.height * window.devicePixelRatio));
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    };

    const physicsTick = () => {
      const repulsion = 3600;
      const spring = 0.004;
      const springLength = 180;
      const damping = 0.86;

      for (let i = 0; i < nodes.length; i += 1) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j += 1) {
          const b = nodes[j];
          let dx = a.x - b.x;
          let dy = a.y - b.y;
          let d2 = dx * dx + dy * dy;
          if (d2 < 1) d2 = 1;
          const force = repulsion / d2;
          const mag = Math.sqrt(d2);
          dx /= mag;
          dy /= mag;
          a.vx += dx * force;
          a.vy += dy * force;
          b.vx -= dx * force;
          b.vy -= dy * force;
        }
      }

      for (const edge of edges) {
        if (!edge.sourceNode || !edge.targetNode) continue;
        const a = edge.sourceNode;
        const b = edge.targetNode;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        const diff = d - springLength;
        const fx = (dx / d) * diff * spring;
        const fy = (dy / d) * diff * spring;
        a.vx += fx;
        a.vy += fy;
        b.vx -= fx;
        b.vy -= fy;
      }

      for (const node of nodes) {
        if (view.dragNodeId === node.id) continue;
        node.vx *= damping;
        node.vy *= damping;
        node.x += node.vx;
        node.y += node.vy;
      }
    };

    const draw = () => {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      ctx.clearRect(0, 0, width, height);

      ctx.save();
      ctx.translate(view.panX, view.panY);
      ctx.scale(view.zoom, view.zoom);

      for (const edge of edges) {
        if (!edge.sourceNode || !edge.targetNode) continue;
        const selected = view.selected && (edge.source === view.selected || edge.target === view.selected);
        ctx.lineWidth = selected ? 2 : 1.2;
        ctx.strokeStyle = edge.present ? (selected ? "#9d3a0f" : "rgba(157,58,15,0.38)") : "rgba(162,63,38,0.5)";
        if (!edge.present) {
          ctx.setLineDash([6, 4]);
        } else {
          ctx.setLineDash([]);
        }
        ctx.beginPath();
        ctx.moveTo(edge.sourceNode.x, edge.sourceNode.y);
        ctx.lineTo(edge.targetNode.x, edge.targetNode.y);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      for (const node of nodes) {
        const selected = node.id === view.selected;
        const model = nameToModel.get(node.id);
        const links = edges.filter((e) => e.source === node.id || e.target === node.id).length;

        ctx.beginPath();
        ctx.fillStyle = selected ? "#9d3a0f" : "#fefcf8";
        ctx.strokeStyle = selected ? "#9d3a0f" : "#b8ab99";
        ctx.lineWidth = selected ? 2.5 : 1.2;
        ctx.arc(node.x, node.y, node.radius + Math.min(12, Math.max(4, Math.sqrt(links))), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = selected ? "#fff" : "#30261f";
        ctx.font = "600 11px IBM Plex Sans, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const text = node.label.length > 20 ? node.label.slice(0, 18) + ".." : node.label;
        ctx.fillText(text, node.x, node.y - 5);

        ctx.fillStyle = selected ? "rgba(255,255,255,0.85)" : "#7b6d5f";
        ctx.font = "10px IBM Plex Sans, Segoe UI, sans-serif";
        ctx.fillText(model ? model.collection : "?", node.x, node.y + 10);
      }

      ctx.restore();
    };

    const tick = () => {
      physicsTick();
      draw();
      window.requestAnimationFrame(tick);
    };

    const renderStats = () => {
      const chips = [
        "DB: " + schemaData.database,
        "Models: " + schemaData.modelCount,
        "Refs: " + schemaData.edgeCount,
        "Generated: " + new Date(schemaData.generatedAt).toLocaleString(),
      ];

      stats.innerHTML = chips.map((c) => '<span class="chip">' + c + '</span>').join("");
      subtitle.textContent = schemaData.importedModelFiles.length + " model files scanned via Mongoose connection";
    };

    const modelItemHTML = (model, isActive) => {
      const relationCount = edges.filter((e) => e.source === model.model || e.target === model.model).length;
      return '<div class="model-item ' + (isActive ? "active" : "") + '" data-model="' + model.model + '">' +
        '<div class="name">' + model.model + '</div>' +
        '<div class="meta">' + model.collection + ' • ' + model.fields.length + ' fields • ' + relationCount + ' refs</div>' +
      '</div>';
    };

    const renderModelList = () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = schemaData.models.filter((m) =>
        m.model.toLowerCase().includes(q) || m.collection.toLowerCase().includes(q),
      );

      modelList.innerHTML = filtered
        .map((m) => modelItemHTML(m, m.model === view.selected))
        .join("");

      for (const el of modelList.querySelectorAll(".model-item")) {
        el.addEventListener("click", () => {
          const id = el.getAttribute("data-model");
          if (!id) return;
          selectModel(id);
          const node = nodeById.get(id);
          if (node) {
            view.panX = canvas.clientWidth / 2 - node.x * view.zoom;
            view.panY = canvas.clientHeight / 2 - node.y * view.zoom;
          }
        });
      }
    };

    const pill = (text, kind = "") => '<span class="pill ' + kind + '">' + text + '</span>';

    const renderDetail = () => {
      if (!view.selected || !nameToModel.has(view.selected)) {
        detail.innerHTML = '<h2>No model selected</h2><div class="empty">Select a model from the left panel or click a node in the graph.</div>';
        return;
      }

      const model = nameToModel.get(view.selected);
      const outgoing = edges.filter((e) => e.source === model.model);
      const incoming = edges.filter((e) => e.target === model.model);

      const fieldsRows = model.fields
        .map((f) => {
          const badges = [
            f.required ? pill("required", "ok") : "",
            f.unique ? pill("unique", "ok") : "",
            f.index ? pill("index") : "",
            f.array ? pill("array") : "",
            f.ref ? pill("ref:" + f.ref, nameToModel.has(f.ref) ? "ok" : "bad") : "",
          ].join(" ");

          const enumCell = f.enumValues && f.enumValues.length ? escapeHtml(JSON.stringify(f.enumValues)) : "";

          return '<tr>' +
            '<td>' + escapeHtml(f.path) + '</td>' +
            '<td>' + escapeHtml(f.type) + '</td>' +
            '<td>' + escapeHtml(f.default ?? "") + '</td>' +
            '<td>' + enumCell + '</td>' +
            '<td>' + badges + '</td>' +
          '</tr>';
        })
        .join("");

      const indexRows = model.indexes.length
        ? model.indexes
            .map((idx) => {
              return '<tr>' +
                '<td><code>' + escapeHtml(JSON.stringify(idx.spec)) + '</code></td>' +
                '<td><code>' + escapeHtml(JSON.stringify(idx.options || {})) + '</code></td>' +
              '</tr>';
            })
            .join("")
        : '<tr><td colspan="2" class="empty">No custom indexes</td></tr>';

      const relationRows = [...outgoing.map((r) => ({ ...r, direction: "out" })), ...incoming.map((r) => ({ ...r, direction: "in" }))]
        .map((r) => {
          const txt = r.direction === "out"
            ? r.field + " -> " + r.target
            : r.source + " -> " + r.field;
          return '<div>' + pill(r.direction === "out" ? "out" : "in") + ' ' + escapeHtml(txt) + ' ' + (r.present ? "" : pill("missing", "bad")) + '</div>';
        })
        .join("");

      detail.innerHTML =
        '<h2>' + escapeHtml(model.model) + '</h2>' +
        '<p>Collection: <strong>' + escapeHtml(model.collection) + '</strong> • Documents: <strong>' + (model.count ?? "n/a") + '</strong> • Timestamps: <strong>' + (model.timestamps ? "enabled" : "disabled") + '</strong></p>' +
        '<table><thead><tr><th>Field</th><th>Type</th><th>Default</th><th>Enum</th><th>Flags</th></tr></thead><tbody>' + fieldsRows + '</tbody></table>' +
        '<h3>Indexes</h3>' +
        '<table><thead><tr><th>Spec</th><th>Options</th></tr></thead><tbody>' + indexRows + '</tbody></table>' +
        '<h3>Relations (' + (incoming.length + outgoing.length) + ')</h3>' +
        (relationRows || '<div class="empty">No relations for this model</div>');
    };

    const selectModel = (id) => {
      if (!nameToModel.has(id)) return;
      view.selected = id;
      renderModelList();
      renderDetail();
    };

    const nearestNode = (wx, wy) => {
      let hit = null;
      let min = Infinity;
      for (const node of nodes) {
        const d = Math.hypot(wx - node.x, wy - node.y);
        const threshold = node.radius + 15;
        if (d < threshold && d < min) {
          min = d;
          hit = node;
        }
      }
      return hit;
    };

    canvas.addEventListener("mousedown", (evt) => {
      const rect = canvas.getBoundingClientRect();
      const sx = evt.clientX - rect.left;
      const sy = evt.clientY - rect.top;
      const world = screenToWorld(sx, sy);
      const hit = nearestNode(world.x, world.y);

      view.lastPointerX = sx;
      view.lastPointerY = sy;

      if (hit) {
        view.dragNodeId = hit.id;
        view.dragOffsetX = hit.x - world.x;
        view.dragOffsetY = hit.y - world.y;
        selectModel(hit.id);
      } else {
        view.draggingCanvas = true;
      }

      canvas.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (evt) => {
      const rect = canvas.getBoundingClientRect();
      const sx = evt.clientX - rect.left;
      const sy = evt.clientY - rect.top;

      if (view.dragNodeId) {
        const node = nodeById.get(view.dragNodeId);
        if (!node) return;
        const world = screenToWorld(sx, sy);
        node.x = world.x + view.dragOffsetX;
        node.y = world.y + view.dragOffsetY;
        node.vx = 0;
        node.vy = 0;
        return;
      }

      if (view.draggingCanvas) {
        const dx = sx - view.lastPointerX;
        const dy = sy - view.lastPointerY;
        view.panX += dx;
        view.panY += dy;
        view.lastPointerX = sx;
        view.lastPointerY = sy;
      }
    });

    window.addEventListener("mouseup", () => {
      view.dragNodeId = null;
      view.draggingCanvas = false;
      canvas.style.cursor = "grab";
    });

    canvas.addEventListener("wheel", (evt) => {
      evt.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = evt.clientX - rect.left;
      const sy = evt.clientY - rect.top;
      const before = screenToWorld(sx, sy);

      const factor = evt.deltaY < 0 ? 1.08 : 0.92;
      view.zoom = clamp(view.zoom * factor, 0.25, 2.4);

      const after = screenToWorld(sx, sy);
      view.panX += (after.x - before.x) * view.zoom;
      view.panY += (after.y - before.y) * view.zoom;
    }, { passive: false });

    searchInput.addEventListener("input", renderModelList);
    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    renderStats();
    renderModelList();
    renderDetail();
    tick();
  </script>
</body>
